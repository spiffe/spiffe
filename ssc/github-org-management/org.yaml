# SPIFFE GitHub organization configuration, applied by Peribolos.
#
# Peribolos is AUTHORITATIVE over the org's team list: any team that exists in
# the `spiffe` org but is NOT listed below becomes a deletion candidate when
# `--fix-teams` runs. For that reason every existing team is enumerated here,
# even ones we are not actively curating yet. See ./README.md before editing.
#
# This file is reconciled with `--fix-teams --fix-team-members` only. Org
# membership, org settings, and repo permissions are NOT managed here.
